<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reporte Financiero — Detalle de Pagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#1C2B33;
    --paper:#F7F5F0;
    --paper-line:#DAD4C6;
    --sig:#0F6657;
    --sig-soft:#E4F0EC;
    --cemei:#B5563C;
    --cemei-soft:#F6E8E2;
    --muted:#6B6458;
    --display: 'Source Serif 4', Georgia, serif;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:1080px; margin:0 auto; padding:48px 28px 80px; }

  header.masthead{
    border-bottom:2px solid var(--ink);
    padding-bottom:20px;
    margin-bottom:32px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
  }
  .masthead-title{ font-family:var(--display); font-weight:600; font-size:34px; letter-spacing:-0.01em; }
  .masthead-sub{ font-family:var(--mono); font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:6px; }
  .masthead-stamp{ font-family:var(--mono); font-size:12px; color:var(--muted); text-align:right; line-height:1.6; }

  .filters{
    display:flex; gap:14px; align-items:end; flex-wrap:wrap;
    background:#fff;
    border:1px solid var(--paper-line);
    border-radius:4px;
    padding:18px 20px;
    margin-bottom:28px;
  }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); font-weight:600; }
  .field input{
    font-family:var(--mono); font-size:14px;
    border:1px solid var(--paper-line); border-radius:3px;
    padding:8px 10px; background:var(--paper); color:var(--ink);
    min-width:150px;
  }
  .field input:focus{ outline:2px solid var(--ink); outline-offset:1px; }
  button#btnBuscar{
    font-family:var(--sans); font-weight:600; font-size:13px;
    background:var(--ink); color:var(--paper);
    border:none; border-radius:3px; padding:10px 20px; cursor:pointer;
  }
  button#btnBuscar:hover{ background:#0e1a20; }
  button#btnBuscar:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; }

  .estado{ font-family:var(--mono); font-size:13px; color:var(--muted); margin:-10px 0 24px; min-height:18px; }
  .estado.error{ color:var(--cemei); }

  .summary{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1px; background:var(--paper-line); border:1px solid var(--paper-line); margin-bottom:36px; }
  .summary .card{ background:#fff; padding:20px 22px; }
  .summary .card .label{ font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); font-weight:600; margin-bottom:10px; }
  .summary .card .value{ font-family:var(--mono); font-size:26px; font-weight:600; font-variant-numeric:tabular-nums; }
  .summary .card.sig .value{ color:var(--sig); }
  .summary .card.cemei .value{ color:var(--cemei); }

  section.block{ margin-bottom:40px; }
  .block-title{
    font-family:var(--display); font-size:20px; font-weight:600;
    display:flex; align-items:baseline; gap:10px; margin-bottom:18px;
  }
  .block-title .n{ font-family:var(--mono); font-size:12px; color:var(--muted); }

  .chart-card{ background:#fff; border:1px solid var(--paper-line); border-radius:4px; padding:24px; height:340px; }

  table{ width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--paper-line); }
  thead th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--muted); font-weight:600; padding:12px 14px;
    border-bottom:2px solid var(--ink);
    position:sticky; top:0; background:#fff;
  }
  tbody td{ padding:11px 14px; border-bottom:1px solid var(--paper-line); font-size:13.5px; vertical-align:top; }
  tbody tr:hover{ background:var(--paper); }
  td.num{ font-family:var(--mono); font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap; }
  td.concepto{ color:var(--muted); max-width:340px; }
  .badge{
    font-family:var(--mono); font-size:10.5px; font-weight:600; text-transform:uppercase;
    letter-spacing:0.04em; padding:3px 8px; border-radius:3px; display:inline-block;
  }
  .badge.sig{ background:var(--sig-soft); color:var(--sig); }
  .badge.cemei{ background:var(--cemei-soft); color:var(--cemei); }

  .table-scroll{ max-height:520px; overflow:auto; border:1px solid var(--paper-line); }
  .table-scroll table{ border:none; }

  footer{ margin-top:48px; padding-top:18px; border-top:1px solid var(--paper-line); font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; }

  @media (max-width:640px){
    .masthead-title{ font-size:26px; }
    .summary .card .value{ font-size:21px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div>
      <div class="masthead-title">Detalle de Pagos</div>
      <div class="masthead-sub">Salud Integral · SIG Clínica (CEMEI)</div>
    </div>
    <div class="masthead-stamp" id="stampFecha">Actualizado: —</div>
  </header>

  <div class="filters">
    <div class="field">
      <label for="desde">Fecha desde</label>
      <input type="date" id="desde" />
    </div>
    <div class="field">
      <label for="hasta">Fecha hasta</label>
      <input type="date" id="hasta" />
    </div>
    <div class="field" style="min-width:260px;">
      <label for="backendUrl">URL del backend</label>
      <input type="text" id="backendUrl" placeholder="https://tu-backend.onrender.com" />
    </div>
    <button id="btnBuscar">Consultar</button>
  </div>

  <div class="estado" id="estado"></div>

  <div class="summary" id="summary"></div>

  <section class="block">
    <div class="block-title">Importe por rubro <span class="n" id="rubroN"></span></div>
    <div class="chart-card"><canvas id="chartRubro"></canvas></div>
  </section>

  <section class="block">
    <div class="block-title">Pagos <span class="n" id="tablaN"></span></div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Origen</th>
            <th>Proveedor</th>
            <th>Rubro</th>
            <th class="num">Importe</th>
            <th>Concepto</th>
          </tr>
        </thead>
        <tbody id="tbodyPagos"></tbody>
      </table>
    </div>
  </section>

  <footer>Datos provistos por las APIs internas de SOEM Group — uso interno</footer>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
let chartRubro = null;

function hoyISO(){ return new Date().toISOString().slice(0,10); }
function primerDiaDeMesISO(){
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0,10);
}

function formatARS(numero){
  return new Intl.NumberFormat('es-AR', { style:'currency', currency:'ARS', maximumFractionDigits:0 }).format(numero || 0);
}
function formatFechaCorta(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

// Recordar la URL del backend entre sesiones (en memoria de la pestaña, no localStorage)
let backendUrlGuardada = '';

async function consultar(){
  const desde = $('#desde').value;
  const hasta = $('#hasta').value;
  const backendUrl = $('#backendUrl').value.trim().replace(/\/$/, '');
  const estado = $('#estado');

  if(!backendUrl){
    estado.textContent = 'Ingresá la URL de tu backend (por ejemplo, https://tu-backend.onrender.com).';
    estado.classList.add('error');
    return;
  }
  if(!desde){
    estado.textContent = 'La fecha "desde" es obligatoria.';
    estado.classList.add('error');
    return;
  }

  backendUrlGuardada = backendUrl;
  estado.classList.remove('error');
  estado.textContent = 'Consultando…';

  try{
    const url = `${backendUrl}/api/pagos?desde=${desde}&hasta=${hasta || desde}`;
    const resp = await fetch(url);
    if(!resp.ok){
      const errJson = await resp.json().catch(()=>({}));
      throw new Error(errJson.error || `Error HTTP ${resp.status}`);
    }
    const data = await resp.json();
    estado.textContent = `${data.total} pagos encontrados.`;
    $('#stampFecha').textContent = `Actualizado: ${new Date().toLocaleString('es-AR')}`;
    render(data.pagos);
  }catch(err){
    estado.classList.add('error');
    estado.textContent = `No se pudo consultar el backend: ${err.message}`;
    render([]);
  }
}

function render(pagos){
  renderSummary(pagos);
  renderChartRubro(pagos);
  renderTabla(pagos);
}

function renderSummary(pagos){
  const total = pagos.reduce((a,p)=>a+(p.importe||0),0);
  const sig = pagos.filter(p=>p.origen.includes('Salud Integral'));
  const cemei = pagos.filter(p=>p.origen.includes('CEMEI'));
  const totalSig = sig.reduce((a,p)=>a+(p.importe||0),0);
  const totalCemei = cemei.reduce((a,p)=>a+(p.importe||0),0);

  $('#summary').innerHTML = `
    <div class="card">
      <div class="label">Total general</div>
      <div class="value">${formatARS(total)}</div>
    </div>
    <div class="card sig">
      <div class="label">Salud Integral</div>
      <div class="value">${formatARS(totalSig)}</div>
    </div>
    <div class="card cemei">
      <div class="label">CEMEI</div>
      <div class="value">${formatARS(totalCemei)}</div>
    </div>
    <div class="card">
      <div class="label">Cantidad de pagos</div>
      <div class="value">${pagos.length}</div>
    </div>
  `;
}

function renderChartRubro(pagos){
  const porRubro = {};
  pagos.forEach(p=>{
    const r = p.rubro || 'Sin rubro';
    porRubro[r] = (porRubro[r]||0) + (p.importe||0);
  });
  const entradas = Object.entries(porRubro).sort((a,b)=>b[1]-a[1]).slice(0,12);
  $('#rubroN').textContent = `(${Object.keys(porRubro).length} rubros)`;

  const ctx = document.getElementById('chartRubro').getContext('2d');
  if(chartRubro) chartRubro.destroy();
  chartRubro = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: entradas.map(e=>e[0]),
      datasets: [{
        data: entradas.map(e=>e[1]),
        backgroundColor: '#0F6657',
        borderRadius: 2,
        maxBarThickness: 28,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display:false },
        tooltip: { callbacks: { label: (c)=> formatARS(c.parsed.x) } } },
      scales: {
        x: { ticks: { callback:(v)=>formatARS(v), font:{family:'IBM Plex Mono', size:10} }, grid:{ color:'#EFEAE0' } },
        y: { ticks: { font:{family:'Inter', size:11} }, grid:{ display:false } }
      }
    }
  });
}

function renderTabla(pagos){
  $('#tablaN').textContent = `(${pagos.length})`;
  const ordenado = [...pagos].sort((a,b)=> (b.fechaCobro||'').localeCompare(a.fechaCobro||''));
  $('#tbodyPagos').innerHTML = ordenado.map(p=>{
    const esCemei = p.origen.includes('CEMEI');
    return `
      <tr>
        <td>${formatFechaCorta(p.fechaCobro)}</td>
        <td><span class="badge ${esCemei?'cemei':'sig'}">${esCemei?'CEMEI':'SIG'}</span></td>
        <td>${escapeHtml(p.proveedor||'')}</td>
        <td>${escapeHtml(p.rubro||'')}</td>
        <td class="num">${formatARS(p.importe)}</td>
        <td class="concepto">${escapeHtml(p.concepto||'')}</td>
      </tr>`;
  }).join('');
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, (c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Valores iniciales: mes actual
$('#desde').value = primerDiaDeMesISO();
$('#hasta').value = hoyISO();
$('#btnBuscar').addEventListener('click', consultar);
</script>
</body>
</html>
