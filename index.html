<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reporte Financiero — Detalle de Pagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#1C2B33; --paper:#F7F5F0; --paper-line:#DAD4C6;
    --sig:#0F6657; --sig-soft:#E4F0EC;
    --cemei:#B5563C; --cemei-soft:#F6E8E2;
    --muted:#6B6458;
    --display:'Source Serif 4',Georgia,serif;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;
    --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1100px;margin:0 auto;padding:40px 24px 80px;}

  header.masthead{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;}
  .masthead-title{font-family:var(--display);font-weight:600;font-size:32px;letter-spacing:-0.01em;}
  .masthead-sub{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}
  .masthead-stamp{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;line-height:1.7;}

  .filters{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;background:#fff;border:1px solid var(--paper-line);border-radius:4px;padding:16px 18px;margin-bottom:22px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:600;}
  .field input,.field select{font-family:var(--mono);font-size:13px;border:1px solid var(--paper-line);border-radius:3px;padding:7px 10px;background:var(--paper);color:var(--ink);}
  .field input{min-width:148px;}
  .field select{min-width:180px;cursor:pointer;}
  .field input:focus,.field select:focus{outline:2px solid var(--ink);outline-offset:1px;}
  button#btnBuscar{font-family:var(--sans);font-weight:600;font-size:13px;background:var(--ink);color:var(--paper);border:none;border-radius:3px;padding:9px 20px;cursor:pointer;}
  button#btnBuscar:hover{background:#0e1a20;}

  .estado{font-family:var(--mono);font-size:12px;color:var(--muted);margin:-8px 0 20px;min-height:16px;}
  .estado.error{color:var(--cemei);}

  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--paper-line);border:1px solid var(--paper-line);margin-bottom:32px;}
  .summary .card{background:#fff;padding:18px 20px;}
  .summary .card .label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:600;margin-bottom:8px;}
  .summary .card .value{font-family:var(--mono);font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;}
  .summary .card.sig .value{color:var(--sig);}
  .summary .card.cemei .value{color:var(--cemei);}

  section.block{margin-bottom:36px;}
  .block-title{font-family:var(--display);font-size:19px;font-weight:600;display:flex;align-items:baseline;gap:8px;margin-bottom:14px;}
  .block-title .n{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .chart-card{background:#fff;border:1px solid var(--paper-line);border-radius:4px;padding:22px;height:360px;}

  table{width:100%;border-collapse:collapse;background:#fff;}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);font-weight:600;padding:11px 12px;border-bottom:2px solid var(--ink);position:sticky;top:0;background:#fff;white-space:nowrap;}
  tbody td{padding:10px 12px;border-bottom:1px solid var(--paper-line);font-size:13px;vertical-align:top;}
  tbody tr:hover{background:var(--paper);}
  td.num{font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;}
  td.small{color:var(--muted);font-size:12px;max-width:300px;}
  .badge{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;padding:2px 7px;border-radius:3px;display:inline-block;}
  .badge.sig{background:var(--sig-soft);color:var(--sig);}
  .badge.cemei{background:var(--cemei-soft);color:var(--cemei);}
  .table-scroll{max-height:540px;overflow:auto;border:1px solid var(--paper-line);}
  .table-scroll table{border:none;}

  footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--paper-line);font-family:var(--mono);font-size:10.5px;color:var(--muted);text-align:center;}
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div>
      <div class="masthead-title">Detalle de Pagos</div>
      <div class="masthead-sub">Salud Integral · SIG Clínica (CEMEI)</div>
    </div>
    <div class="masthead-stamp" id="stampFecha">Actualizado: —</div>
  </header>

  <div class="filters">
    <div class="field">
      <label>Fecha desde</label>
      <input type="date" id="desde" />
    </div>
    <div class="field">
      <label>Fecha hasta</label>
      <input type="date" id="hasta" />
    </div>
    <div class="field">
      <label>Empresa</label>
      <select id="filtroEmpresa">
        <option value="">Salud Integral + CEMEI</option>
        <option value="SIG">Solo Salud Integral (SIG)</option>
        <option value="CEMEI">Solo SIG Clínica (CEMEI)</option>
      </select>
    </div>
    <div class="field" style="min-width:240px;">
      <label>URL del backend</label>
      <input type="text" id="backendUrl" value="https://reporte-financiero-backend.onrender.com" />
    </div>
    <button id="btnBuscar">Consultar</button>
  </div>

  <div class="estado" id="estado"></div>
  <div class="summary" id="summary"></div>

  <section class="block">
    <div class="block-title">Importe por rubro <span class="n" id="rubroN"></span></div>
    <div class="chart-card"><canvas id="chartRubro"></canvas></div>
  </section>

  <section class="block">
    <div class="block-title">Pagos <span class="n" id="tablaN"></span></div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Empresa</th>
            <th>Proveedor</th>
            <th>Rubro</th>
            <th class="num">Importe</th>
            <th>Concepto</th>
          </tr>
        </thead>
        <tbody id="tbodyPagos"></tbody>
      </table>
    </div>
  </section>

  <footer>Datos provistos por las APIs internas de SOEM Group — uso interno</footer>
</div>

<script>
let chartRubro = null;
let pagosBrutos = [];

function hoyISO(){ return new Date().toISOString().slice(0,10); }
function primerDiaMes(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10); }
function formatARS(n){ return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n||0); }
function formatFecha(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function filtrarPagos(pagos){
  const emp = document.getElementById('filtroEmpresa').value;
  if(!emp) return pagos;
  return pagos.filter(p => {
    const esCemei = p.origen.includes('CEMEI');
    if(emp === 'SIG') return !esCemei;
    if(emp === 'CEMEI') return esCemei;
    return true;
  });
}

async function consultar(){
  const desde = document.getElementById('desde').value;
  const hasta = document.getElementById('hasta').value;
  const backendUrl = document.getElementById('backendUrl').value.trim().replace(/\/$/,'');
  const estado = document.getElementById('estado');
  if(!backendUrl){ estado.textContent='Ingresá la URL del backend.'; estado.className='estado error'; return; }
  if(!desde){ estado.textContent='La fecha "desde" es obligatoria.'; estado.className='estado error'; return; }
  estado.className='estado'; estado.textContent='Consultando…';
  try{
    const resp = await fetch(`${backendUrl}/api/pagos?desde=${desde}&hasta=${hasta||desde}`);
    if(!resp.ok){ const e=await resp.json().catch(()=>({})); throw new Error(e.error||`HTTP ${resp.status}`); }
    const data = await resp.json();
    pagosBrutos = data.pagos;
    estado.textContent=`${data.total} pagos encontrados.`;
    document.getElementById('stampFecha').textContent=`Actualizado: ${new Date().toLocaleString('es-AR')}`;
    render();
  }catch(err){
    estado.className='estado error';
    estado.textContent=`No se pudo consultar: ${err.message}`;
  }
}

function render(){
  const pagos = filtrarPagos(pagosBrutos);
  renderSummary(pagos);
  renderChart(pagos);
  renderTabla(pagos);
}

function renderSummary(pagos){
  const total = pagos.reduce((a,p)=>a+(p.importe||0),0);
  const sig   = pagos.filter(p=>!p.origen.includes('CEMEI')).reduce((a,p)=>a+(p.importe||0),0);
  const cemei = pagos.filter(p=>p.origen.includes('CEMEI')).reduce((a,p)=>a+(p.importe||0),0);
  document.getElementById('summary').innerHTML=`
    <div class="card"><div class="label">Total general</div><div class="value">${formatARS(total)}</div></div>
    <div class="card sig"><div class="label">Salud Integral</div><div class="value">${formatARS(sig)}</div></div>
    <div class="card cemei"><div class="label">CEMEI</div><div class="value">${formatARS(cemei)}</div></div>
    <div class="card"><div class="label">Cantidad de pagos</div><div class="value">${pagos.length}</div></div>`;
}

function renderChart(pagos){
  const porRubro={};
  pagos.forEach(p=>{ const r=p.rubro||'Sin rubro'; porRubro[r]=(porRubro[r]||0)+(p.importe||0); });
  const entradas=Object.entries(porRubro).sort((a,b)=>b[1]-a[1]).slice(0,14);
  document.getElementById('rubroN').textContent=`(${Object.keys(porRubro).length} rubros)`;
  const ctx=document.getElementById('chartRubro').getContext('2d');
  if(chartRubro) chartRubro.destroy();
  chartRubro=new Chart(ctx,{
    type:'bar',
    data:{
      labels:entradas.map(e=>e[0]),
      datasets:[{data:entradas.map(e=>e[1]),backgroundColor:'#0F6657',borderRadius:2,maxBarThickness:28}]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>formatARS(c.parsed.x)}}},
      scales:{
        x:{ticks:{callback:v=>formatARS(v),font:{family:'IBM Plex Mono',size:10}},grid:{color:'#EFEAE0'}},
        y:{ticks:{font:{family:'Inter',size:11}},grid:{display:false}}
      }
    }
  });
}

function renderTabla(pagos){
  document.getElementById('tablaN').textContent=`(${pagos.length})`;
  const ord=[...pagos].sort((a,b)=>(b.fechaCobro||'').localeCompare(a.fechaCobro||''));
  document.getElementById('tbodyPagos').innerHTML=ord.map(p=>{
    const esCemei=p.origen.includes('CEMEI');
    return `<tr>
      <td>${formatFecha(p.fechaCobro)}</td>
      <td><span class="badge ${esCemei?'cemei':'sig'}">${esCemei?'CEMEI':'SIG'}</span></td>
      <td>${esc(p.proveedor)}</td>
      <td>${esc(p.rubro)}</td>
      <td class="num">${formatARS(p.importe)}</td>
      <td class="small">${esc(p.concepto)}</td>
    </tr>`;
  }).join('');
}

// El filtro de empresa filtra en tiempo real sin re-consultar
document.getElementById('filtroEmpresa').addEventListener('change', ()=>{ if(pagosBrutos.length) render(); });

document.getElementById('desde').value = primerDiaMes();
document.getElementById('hasta').value = hoyISO();
document.getElementById('btnBuscar').addEventListener('click', consultar);
</script>
</body>
</html>
